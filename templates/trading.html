{% extends 'base/base.html' %}

{% block title %}Trading - BTC/USDC{% endblock %}

{% block extra_css %}
<style>
    .trading-grid {
        display: flex;
        gap: 20px;
        max-width: 1400px;
        margin: 0 auto;
    }

    .left-column {
        flex: 2;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .right-column {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .chart-card, .order-card, .orderbook-card, .coins-card {
        background: white;
        border-radius: 12px;
        border: 1px solid #E2E4E8;
        overflow: hidden;
    }

    .chart-card {
        padding: 20px;
    }

    .orderbook-card, .coins-card {
        padding: 16px;
    }

    .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .symbol-price {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .symbol-name {
        font-size: 20px;
        font-weight: 600;
        color: #1E2329;
    }

    .current-price {
        font-size: 28px;
        font-weight: 600;
        color: #1E2329;
    }

    .price-change {
        font-size: 14px;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 500;
    }

    .price-up {
        color: #0ECB81;
        background: rgba(14, 203, 129, 0.1);
    }

    .price-down {
        color: #F6465D;
        background: rgba(246, 70, 93, 0.1);
    }

    .timeframes {
        display: flex;
        gap: 4px;
        background: #F8F9FA;
        padding: 4px;
        border-radius: 8px;
        flex-wrap: wrap;
    }

    .tf-btn {
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 500;
        background: none;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .tf-btn:hover {
        color: #1E2329;
        background: #EFF2F5;
    }

    .tf-btn.active {
        background: #EFF2F5;
        color: #1E2329;
    }

    #priceChart {
        width: 100%;
        height: 420px;
    }

    .order-tabs {
        display: flex;
        border-bottom: 1px solid #E2E4E8;
    }

    .order-tab {
        flex: 1;
        padding: 14px;
        text-align: center;
        background: none;
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .order-tab:hover {
        color: #1E2329;
    }

    .order-tab.active {
        color: #1E2329;
        border-bottom: 2px solid #1E2329;
    }

    .order-form {
        padding: 20px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        font-size: 12px;
        color: #707A8A;
        margin-bottom: 8px;
        display: block;
    }

    .form-input {
        width: 100%;
        padding: 12px;
        background: #F8F9FA;
        border: 1px solid #E2E4E8;
        border-radius: 8px;
        font-size: 14px;
        color: #1E2329;
        transition: all 0.2s;
    }

    .form-input:focus {
        outline: none;
        border-color: #D9DDE2;
        background: white;
    }

    .perc-group {
        display: flex;
        gap: 8px;
        margin-top: 10px;
    }

    .perc-btn {
        flex: 1;
        background: #F8F9FA;
        border: 1px solid #E2E4E8;
        border-radius: 6px;
        padding: 6px;
        font-size: 11px;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .perc-btn:hover {
        background: #EFF2F5;
        color: #1E2329;
        border-color: #D9DDE2;
    }

    .btn-buy {
        width: 100%;
        background: #0ECB81;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        margin-top: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-buy-disabled {
        background: #E2E4E8;
        color: #707A8A;
        cursor: not-allowed;
    }

    .btn-sell {
        width: 100%;
        background: #F6465D;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        margin-top: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-sell-disabled {
        background: #E2E4E8;
        color: #707A8A;
        cursor: not-allowed;
    }

    .orderbook-title {
        font-weight: 600;
        margin-bottom: 16px;
        font-size: 14px;
        color: #1E2329;
    }

    .orderbook-header {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #E2E4E8;
        font-size: 11px;
        color: #707A8A;
        text-transform: uppercase;
    }

    .orderbook-row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 12px;
        font-family: monospace;
        cursor: pointer;
        transition: background 0.1s;
        border-radius: 4px;
    }

    .orderbook-row:hover {
        background: #F8F9FA;
    }

    .bid-price {
        color: #0ECB81;
    }

    .ask-price {
        color: #F6465D;
    }

    .coin-list {
        max-height: 380px;
        overflow-y: auto;
    }

    .coin-list::-webkit-scrollbar {
        width: 4px;
    }

    .coin-list::-webkit-scrollbar-track {
        background: #E2E4E8;
        border-radius: 4px;
    }

    .coin-list::-webkit-scrollbar-thumb {
        background: #D9DDE2;
        border-radius: 4px;
    }

    .coin-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        border-bottom: 1px solid #E2E4E8;
        cursor: pointer;
        transition: background 0.2s;
        border-radius: 8px;
    }

    .coin-item:hover {
        background: #F8F9FA;
    }

    .coin-info {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .coin-symbol {
        font-weight: 600;
        font-size: 13px;
        color: #1E2329;
    }

    .coin-name {
        font-size: 10px;
        color: #707A8A;
        margin-top: 2px;
    }

    .coin-price {
        font-weight: 500;
        font-size: 12px;
        color: #1E2329;
    }

    .coin-change {
        font-size: 11px;
        font-weight: 500;
        margin-top: 2px;
        text-align: right;
    }

    .stats-mini {
        display: flex;
        justify-content: space-between;
        background: #F8F9FA;
        border-radius: 8px;
        padding: 12px;
        margin-top: 16px;
    }

    .stat-mini {
        text-align: center;
        flex: 1;
    }

    .stat-mini-label {
        font-size: 10px;
        color: #707A8A;
    }

    .stat-mini-value {
        font-size: 13px;
        font-weight: 600;
        color: #1E2329;
        margin-top: 4px;
    }

    .total-amount {
        font-size: 20px;
        font-weight: 600;
        color: #1E2329;
    }

    .loading-chart {
        text-align: center;
        padding: 180px;
        color: #707A8A;
    }

    @media (max-width: 992px) {
        .trading-grid {
            flex-direction: column;
        }
        #priceChart {
            height: 320px;
        }
        .loading-chart {
            padding: 100px;
        }
        .timeframes {
            width: 100%;
            justify-content: center;
        }
        .coin-list {
            max-height: 250px;
        }
        .coin-info img {
            width: 28px;
            height: 28px;
        }
    }

    /* Trading Bot Styles */
.trading-bot-icon {
    width: 28px;
    height: 28px;
    background: #0ECB81;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    animation: pulse 2s infinite;
}

.trading-bot-icon.bot-active {
    background: #0ECB81;
    box-shadow: 0 0 10px rgba(14, 203, 129, 0.5);
}

.trading-bot-icon.bot-inactive {
    background: #707A8A;
}

.trading-bot-icon:hover {
    transform: scale(1.1);
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0.4);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(14, 203, 129, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0);
    }
}

.bot-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
}

.bot-modal-content {
    background: white;
    border-radius: 16px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
}

.bot-status {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 8px;
}

.bot-status.active {
    background: #0ECB81;
    animation: pulse 1.5s infinite;
}

.bot-status.inactive {
    background: #F6465D;
}

.bot-analysis-item {
    padding: 12px;
    border-bottom: 1px solid #E2E4E8;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.bot-analysis-label {
    font-size: 12px;
    color: #707A8A;
}

.bot-analysis-value {
    font-weight: 600;
    font-size: 13px;
}

.bot-signal-buy {
    color: #0ECB81;
}

.bot-signal-sell {
    color: #F6465D;
}

.bot-signal-neutral {
    color: #F0B90B;
}
    @keyframes slideIn {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
    @keyframes slideIn {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0.4);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(14, 203, 129, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0);
    }
}
</style>
{% endblock %}

{% block content %}
<div class="trading-grid">
    <div class="left-column">
        <div class="chart-card">
            <div class="chart-header">
                <div class="symbol-price">
                    <img id="currentCoinIcon" src="" alt="" style="width: 32px; height: 32px; border-radius: 50%;">
                    <div>
                        <span class="symbol-name" id="symbolName">BTC/USDC</span>
                        <div>
                            <span class="current-price" id="currentPrice">$0.00</span>
                            <span class="price-change" id="priceChange">0.00%</span>
                        </div>
                    </div>
                </div>
                <div class="timeframes">
                    <button class="tf-btn" data-tf="1">24h</button>
                    <button class="tf-btn active" data-tf="7">7d</button>
                    <button class="tf-btn" data-tf="30">30d</button>
                    <button class="tf-btn" data-tf="90">90d</button>
                    <button class="tf-btn" data-tf="365">1y</button>
                </div>
            </div>
            <div id="chartContainer">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="order-card">
            <div class="order-tabs">
                <button class="order-tab active" data-tab="limit">Limit Order</button>
                <button class="order-tab" data-tab="market">Market Order</button>
            </div>

            <div id="limitPanel" class="order-form">
                <div class="form-group">
                    <label class="form-label">Price (USDC)</label>
                    <input type="number" id="limitPrice" class="form-input" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label class="form-label">Amount (USDC)</label>
                    <input type="number" id="limitAmount" class="form-input" step="0.01" placeholder="0.00">
                    <div class="perc-group">
                        <button class="perc-btn" data-perc="25">25%</button>
                        <button class="perc-btn" data-perc="50">50%</button>
                        <button class="perc-btn" data-perc="75">75%</button>
                        <button class="perc-btn" data-perc="100">100%</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Total</label>
                    <div class="total-amount" id="limitTotal">$0.00</div>
                </div>
                <button class="btn-buy" id="buyBtn">Buy BTC</button>
                <button class="btn-sell" id="sellBtn">Sell BTC</button>
            </div>

            <div id="marketPanel" class="order-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Amount (USDC)</label>
                    <input type="number" id="marketAmount" class="form-input" placeholder="0.00">
                    <div class="perc-group">
                        <button class="perc-btn" data-market-perc="25">25%</button>
                        <button class="perc-btn" data-market-perc="50">50%</button>
                        <button class="perc-btn" data-market-perc="75">75%</button>
                        <button class="perc-btn" data-market-perc="100">100%</button>
                    </div>
                </div>
                <button class="btn-buy" id="buyBtnMarket">Buy BTC</button>
                <button class="btn-sell" id="sellBtnMarket">Sell BTC</button>
            </div>
        </div>
    </div>

    <div class="right-column">
        <div class="orderbook-card">
            <div class="orderbook-title">Order Book</div>
            <div class="orderbook-header">
                <span>Price (USDC)</span>
                <span>Amount</span>
                <span>Total</span>
            </div>
            <div id="askOrders" style="margin-bottom: 8px;"></div>
            <div id="bidOrders"></div>
        </div>

        <div class="coins-card">
            <div class="orderbook-title">Top Coins</div>
            <div class="coin-list" id="coinList"></div>
            <div class="stats-mini">
                <div class="stat-mini">
                    <div class="stat-mini-label">Your Balance</div>
                    <div class="stat-mini-value" id="userBalance">$0.00</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-label">24h Volume</div>
                    <div class="stat-mini-value" id="globalVolume">$0</div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Bot Analysis Modal -->
<div id="botModal" class="bot-modal" style="display: none;">
    <div class="bot-modal-content">
        <div id="botModalContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const API_BASE = '/api';
    const COINGECKO_API = 'https://api.coingecko.com/api/v3';

    let priceChart = null;
    let tokens = [];
    let currentSymbol = 'BTC';
    let currentDays = 7;
    let userBalance = 0;
    let userHoldings = {};
    let currentPrice = 0;
    let userGrandBalance = 0;

    // Crypto icons from CDN
    function getTokenIcon(symbol) {
        const icons = {
            'BTC': 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png',
            'ETH': 'https://assets.coingecko.com/coins/images/279/small/ethereum.png',
            'BNB': 'https://assets.coingecko.com/coins/images/825/small/bnb-icon2.png',
            'SOL': 'https://assets.coingecko.com/coins/images/4128/small/solana.png',
            'XRP': 'https://assets.coingecko.com/coins/images/44/small/xrp-symbol-white-128.png',
            'ADA': 'https://assets.coingecko.com/coins/images/975/small/cardano.png',
            'DOGE': 'https://assets.coingecko.com/coins/images/5/small/dogecoin.png',
            'AVAX': 'https://assets.coingecko.com/coins/images/12559/small/avalanche.png',
            'DOT': 'https://assets.coingecko.com/coins/images/12171/small/polkadot.png',
            'NEAR': 'https://assets.coingecko.com/coins/images/10365/small/near.png',
            'LTC': 'https://assets.coingecko.com/coins/images/2/small/litecoin.png',
            'THETA': 'https://assets.coingecko.com/coins/images/2538/small/theta-token.png',
            'PEPE': 'https://assets.coingecko.com/coins/images/29850/small/pepe-token.jpeg',
            'LINK': 'https://assets.coingecko.com/coins/images/877/small/chainlink-new-logo.png',
            'UNI': 'https://assets.coingecko.com/coins/images/12504/small/uni.jpg',
            'ATOM': 'https://assets.coingecko.com/coins/images/1481/small/cosmos_hub.png',
            'ALGO': 'https://assets.coingecko.com/coins/images/4380/small/algorand.png',
            'VET': 'https://assets.coingecko.com/coins/images/1167/small/VeChain.png',
            'FTM': 'https://assets.coingecko.com/coins/images/4001/small/Fantom.png',
            'EGLD': 'https://assets.coingecko.com/coins/images/12335/small/egld.png'
        };
        return icons[symbol] || 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png';
    }

    const symbolToCoinGeckoId = {
        'BTC': 'bitcoin',
        'ETH': 'ethereum',
        'BNB': 'binancecoin',
        'SOL': 'solana',
        'XRP': 'ripple',
        'ADA': 'cardano',
        'DOGE': 'dogecoin',
        'AVAX': 'avalanche-2',
        'DOT': 'polkadot',
        'PEPE': 'pepe',
        'LINK': 'chainlink',
        'UNI': 'uniswap',
        'ATOM': 'cosmos',
        'LTC': 'litecoin',
        'NEAR': 'near',
        'ALGO': 'algorand',
        'VET': 'vechain',
        'FTM': 'fantom',
        'EGLD': 'elrond-erd-2',
        'THETA': 'theta-token'
    };

    function getToken() { return localStorage.getItem('access_token'); }

    async function apiCall(endpoint, method = 'GET', data = null) {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const options = { method, headers };
        if (data) options.body = JSON.stringify(data);
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        if (response.status === 401) window.location.href = '/login/';
        return response.json();
    }

    function formatCurrency(num) {
        if (!num) return '$0.00';

        const value = parseFloat(num);
        if (isNaN(value)) return '$0.00';

        if (value === 0) return '$0.00';

        if (Math.abs(value) < 0.01 && Math.abs(value) > 0) {
            return `$${value.toFixed(8)}`;
        }

        if (value >= 1e9) return `$${(value / 1e9).toFixed(2)}B`;
        if (value >= 1e6) return `$${(value / 1e6).toFixed(2)}M`;

        return `$${value.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}`;
    }

    function formatNumber(num, decimals = 6) {
        if (!num) return '0';

        const value = parseFloat(num);
        if (isNaN(value)) return '0';

        if (value === 0) return '0';

        if (Math.abs(value) < 0.01 && Math.abs(value) > 0) {
            return value.toFixed(8);
        }

        return value.toFixed(decimals);
    }

    async function updateChart() {
        if (!currentSymbol) return;

        const chartContainer = document.getElementById('chartContainer');
        if (!chartContainer) return;

        chartContainer.innerHTML = '<div class="loading-chart">Loading chart data for ' + currentSymbol + '...</div><canvas id="priceChart" style="display:none;"></canvas>';

        const coinId = symbolToCoinGeckoId[currentSymbol];
        if (!coinId) {
            chartContainer.innerHTML = '<div class="loading-chart">Coin not found</div>';
            return;
        }

        try {
            const response = await fetch(`${COINGECKO_API}/coins/${coinId}/market_chart?vs_currency=usd&days=${currentDays}`);
            const data = await response.json();

            if (!data || !data.prices || data.prices.length === 0) {
                chartContainer.innerHTML = '<div class="loading-chart">No data available for ' + currentSymbol + '</div>';
                return;
            }

            const prices = data.prices;
            const labels = [];
            const priceValues = [];

            for (let i = 0; i < prices.length; i++) {
                const date = new Date(prices[i][0]);
                let label;
                if (currentDays <= 2) {
                    label = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else {
                    label = date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                }
                labels.push(label);
                priceValues.push(prices[i][1]);
            }

            chartContainer.innerHTML = '<canvas id="priceChart"></canvas>';
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (priceChart) {
                priceChart.destroy();
            }

            const firstPrice = priceValues[0];
            const lastPrice = priceValues[priceValues.length - 1];
            const changePercent = ((lastPrice - firstPrice) / firstPrice) * 100;
            const changeClass = changePercent >= 0 ? 'price-up' : 'price-down';

            document.getElementById('currentPrice').innerHTML = formatCurrency(lastPrice);
            document.getElementById('priceChange').innerHTML = `${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%`;
            document.getElementById('priceChange').className = `price-change ${changeClass}`;
            document.getElementById('symbolName').innerHTML = `${currentSymbol}/USDC`;
            document.getElementById('currentCoinIcon').src = getTokenIcon(currentSymbol);
            currentPrice = lastPrice;

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${currentSymbol} Price (USD)`,
                        data: priceValues,
                        borderColor: '#1E2329',
                        backgroundColor: 'rgba(30, 35, 41, 0.05)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.2,
                        pointRadius: 0,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'white',
                            titleColor: '#1E2329',
                            bodyColor: '#1E2329',
                            borderColor: '#E2E4E8',
                            borderWidth: 1,
                            callbacks: {
                                label: (ctx) => `${currentSymbol}: $${ctx.raw.toFixed(2)}`
                            }
                        }
                    },
                    scales: {

    function generateOrderBook(price) {
        let bids = [], asks = [];
        for (let i = 0; i < 5; i++) {
            bids.push({ price: price * (1 - (0.0005 + i * 0.0005)), size: 0.5 + Math.random() * 3 });
            asks.push({ price: price * (1 + (0.0005 + i * 0.0005)), size: 0.5 + Math.random() * 3 });
        }
        let bidTotal = 0, askTotal = 0;
        return {
            bids: bids.map(b => ({ ...b, total: bidTotal += b.size })),
            asks: asks.map(a => ({ ...a, total: askTotal += a.size }))
        };
    }

};

// Generate bot analysis
function generateBotAnalysis(symbol, currentPrice, change24h) {
    const config = botConfig[symbol] || botConfig['BTC'];

    let signal = 'NEUTRAL';
    let signalColor = 'bot-signal-neutral';
    let confidence = 65;

    if (change24h > 5) {
        signal = 'STRONG SELL';
        signalColor = 'bot-signal-sell';
        confidence = 75 + Math.min(20, change24h / 2);
    } else if (change24h > 2) {
        signal = 'SELL';
        signalColor = 'bot-signal-sell';
        confidence = 60 + change24h;
    } else if (change24h < -5) {
        signal = 'STRONG BUY';
        signalColor = 'bot-signal-buy';
        confidence = 75 + Math.min(20, Math.abs(change24h) / 2);
    } else if (change24h < -2) {
        signal = 'BUY';
        signalColor = 'bot-signal-buy';
        confidence = 60 + Math.abs(change24h);
    }

    const rsi = 30 + (Math.random() * 70);
    const rsiSignal = rsi > 70 ? 'Overbought - SELL' : (rsi < 30 ? 'Oversold - BUY' : 'Neutral');
    const macd = (Math.random() - 0.5) * 2;
    const macdSignal = macd > 0.5 ? 'Bullish' : (macd < -0.5 ? 'Bearish' : 'Flat');

    return {
        signal: signal,
        signalColor: signalColor,
        confidence: Math.floor(confidence),
        strategy: config.strategy,
        risk: config.risk,
        profitTarget: config.profitTarget,
        stopLoss: config.stopLoss,
        rsi: Math.floor(rsi),
        rsiSignal: rsiSignal,
        macd: macd.toFixed(2),
        macdSignal: macdSignal,
        lastTrade: new Date().toLocaleTimeString(),
        activeTrades: botTradeSimulations[symbol]?.length || 0
    };
}

// Toggle bot status
function toggleBot(symbol) {
    tradingBotActive[symbol] = !tradingBotActive[symbol];

    // Update all bot icons for this symbol
    updateBotIcons(symbol);

    if (tradingBotActive[symbol]) {
        startBotTrading(symbol);
        showToast(`🤖 Trading bot for ${symbol} has been activated!`, 'start');
        // Update signal in modal if open
        updateBotSignalInModal(symbol);
    } else {
        stopBotTrading(symbol);
        showToast(`⏹️ Trading bot for ${symbol} has been stopped.`, 'stop');
    }
}

// Start bot trading simulation
function startBotTrading(symbol) {
    if (botIntervals[symbol]) clearInterval(botIntervals[symbol]);

    botTradeSimulations[symbol] = botTradeSimulations[symbol] || [];

    botIntervals[symbol] = setInterval(() => {
        if (!tradingBotActive[symbol]) return;

        const random = Math.random();
        if (random > 0.7) {
            const isBuy = random > 0.85;
            const config = botConfig[symbol] || botConfig['BTC'];
            const amount = (Math.random() * (config.maxAmount - config.minAmount) + config.minAmount).toFixed(2);

            const trade = {
                type: isBuy ? 'buy' : 'sell',
                amount: amount,
                time: new Date().toLocaleTimeString(),
                price: currentPrice
            };

            botTradeSimulations[symbol].unshift(trade);
            if (botTradeSimulations[symbol].length > 10) botTradeSimulations[symbol].pop();

            showToast(`${isBuy ? '🟢 BOT BUY' : '🔴 BOT SELL'}: ${amount} USDC of ${symbol} at $${currentPrice}`, isBuy ? 'buy' : 'sell');

            // Update modal if open for this symbol
            updateBotSignalInModal(symbol);
        }
    }, 45000 + Math.random() * 30000);
}

// Stop bot trading
function stopBotTrading(symbol) {
    if (botIntervals[symbol]) {
        clearInterval(botIntervals[symbol]);
        delete botIntervals[symbol];
    }
}

// Update bot icons everywhere
function updateBotIcons(symbol) {
    const isActive = tradingBotActive[symbol] || false;

    const chartIcon = document.getElementById(`chart-bot-icon-${symbol}`);

    document.querySelectorAll(`.card-bot-icon[data-symbol="${symbol}"]`).forEach(icon => {
        icon.style.background = isActive ? '#0ECB81' : '#707A8A';
        icon.style.boxShadow = isActive ? '0 0 10px rgba(14,203,129,0.5)' : 'none';
        icon.style.animation = isActive ? 'pulse 2s infinite' : 'none';
    });
}

            botIcon.innerHTML = '🤖';
            botIcon.onclick = (e) => {
                e.stopPropagation();
                showBotAnalysis(symbol, price, change);
            };
            card.style.position = 'relative';
            card.appendChild(botIcon);
        }
    });
}

// Initialize bot icons after coins load
function initBotIcons() {
    addBotIconToChart();
    addBotIconsToCards();
}

// Call this after coins load and after any DOM updates
setInterval(initBotIcons, 2000);
</script>
