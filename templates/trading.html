{% extends 'base/base.html' %}

{% block title %}Trading - BTC/USDC{% endblock %}

{% block extra_css %}
<style>
    .trading-grid {
        display: flex;
        gap: 20px;
        max-width: 1400px;
        margin: 0 auto;
    }

    .left-column {
        flex: 2;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .right-column {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .chart-card, .order-card, .orderbook-card, .coins-card {
        background: white;
        border-radius: 12px;
        border: 1px solid #E2E4E8;
        overflow: hidden;
    }

    .chart-card {
        padding: 20px;
    }

    .orderbook-card, .coins-card {
        padding: 16px;
    }

    .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .symbol-price {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .symbol-name {
        font-size: 20px;
        font-weight: 600;
        color: #1E2329;
    }

    .current-price {
        font-size: 28px;
        font-weight: 600;
        color: #1E2329;
    }

    .price-change {
        font-size: 14px;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 500;
    }

    .price-up {
        color: #0ECB81;
        background: rgba(14, 203, 129, 0.1);
    }

    .price-down {
        color: #F6465D;
        background: rgba(246, 70, 93, 0.1);
    }

    .timeframes {
        display: flex;
        gap: 4px;
        background: #F8F9FA;
        padding: 4px;
        border-radius: 8px;
        flex-wrap: wrap;
    }

    .tf-btn {
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 500;
        background: none;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .tf-btn:hover {
        color: #1E2329;
        background: #EFF2F5;
    }

    .tf-btn.active {
        background: #EFF2F5;
        color: #1E2329;
    }

    #priceChart {
        width: 100%;
        height: 420px;
    }

    .order-tabs {
        display: flex;
        border-bottom: 1px solid #E2E4E8;
    }

    .order-tab {
        flex: 1;
        padding: 14px;
        text-align: center;
        background: none;
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .order-tab:hover {
        color: #1E2329;
    }

    .order-tab.active {
        color: #1E2329;
        border-bottom: 2px solid #1E2329;
    }

    .order-form {
        padding: 20px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        font-size: 12px;
        color: #707A8A;
        margin-bottom: 8px;
        display: block;
    }

    .form-input {
        width: 100%;
        padding: 12px;
        background: #F8F9FA;
        border: 1px solid #E2E4E8;
        border-radius: 8px;
        font-size: 14px;
        color: #1E2329;
        transition: all 0.2s;
    }

    .form-input:focus {
        outline: none;
        border-color: #D9DDE2;
        background: white;
    }

    .perc-group {
        display: flex;
        gap: 8px;
        margin-top: 10px;
    }

    .perc-btn {
        flex: 1;
        background: #F8F9FA;
        border: 1px solid #E2E4E8;
        border-radius: 6px;
        padding: 6px;
        font-size: 11px;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .perc-btn:hover {
        background: #EFF2F5;
        color: #1E2329;
        border-color: #D9DDE2;
    }

    .btn-buy {
        width: 100%;
        background: #0ECB81;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        margin-top: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-buy-disabled {
        background: #E2E4E8;
        color: #707A8A;
        cursor: not-allowed;
    }

    .btn-sell {
        width: 100%;
        background: #F6465D;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        margin-top: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-sell-disabled {
        background: #E2E4E8;
        color: #707A8A;
        cursor: not-allowed;
    }

    .orderbook-title {
        font-weight: 600;
        margin-bottom: 16px;
        font-size: 14px;
        color: #1E2329;
    }

    .orderbook-header {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #E2E4E8;
        font-size: 11px;
        color: #707A8A;
        text-transform: uppercase;
    }

    .orderbook-row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 12px;
        font-family: monospace;
        cursor: pointer;
        transition: background 0.1s;
        border-radius: 4px;
    }

    .orderbook-row:hover {
        background: #F8F9FA;
    }

    .bid-price {
        color: #0ECB81;
    }

    .ask-price {
        color: #F6465D;
    }

    .coin-list {
        max-height: 380px;
        overflow-y: auto;
    }

    .coin-list::-webkit-scrollbar {
        width: 4px;
    }

    .coin-list::-webkit-scrollbar-track {
        background: #E2E4E8;
        border-radius: 4px;
    }

    .coin-list::-webkit-scrollbar-thumb {
        background: #D9DDE2;
        border-radius: 4px;
    }

    .coin-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        border-bottom: 1px solid #E2E4E8;
        cursor: pointer;
        transition: background 0.2s;
        border-radius: 8px;
    }

    .coin-item:hover {
        background: #F8F9FA;
    }

    .coin-info {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .coin-symbol {
        font-weight: 600;
        font-size: 13px;
        color: #1E2329;
    }

    .coin-name {
        font-size: 10px;
        color: #707A8A;
        margin-top: 2px;
    }

    .coin-price {
        font-weight: 500;
        font-size: 12px;
        color: #1E2329;
    }

    .coin-change {
        font-size: 11px;
        font-weight: 500;
        margin-top: 2px;
        text-align: right;
    }

    .stats-mini {
        display: flex;
        justify-content: space-between;
        background: #F8F9FA;
        border-radius: 8px;
        padding: 12px;
        margin-top: 16px;
    }

    .stat-mini {
        text-align: center;
        flex: 1;
    }

    .stat-mini-label {
        font-size: 10px;
        color: #707A8A;
    }

    .stat-mini-value {
        font-size: 13px;
        font-weight: 600;
        color: #1E2329;
        margin-top: 4px;
    }

    .total-amount {
        font-size: 20px;
        font-weight: 600;
        color: #1E2329;
    }

    .loading-chart {
        text-align: center;
        padding: 180px;
        color: #707A8A;
    }

    @media (max-width: 992px) {
        .trading-grid {
            flex-direction: column;
        }
        #priceChart {
            height: 320px;
        }
        .loading-chart {
            padding: 100px;
        }
        .timeframes {
            width: 100%;
            justify-content: center;
        }
        .coin-list {
            max-height: 250px;
        }
        .coin-info img {
            width: 28px;
            height: 28px;
        }
    }

    /* Trading Bot Styles */
.trading-bot-icon {
    width: 28px;
    height: 28px;
    background: #0ECB81;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    animation: pulse 2s infinite;
}

.trading-bot-icon.bot-active {
    background: #0ECB81;
    box-shadow: 0 0 10px rgba(14, 203, 129, 0.5);
}

.trading-bot-icon.bot-inactive {
    background: #707A8A;
}

.trading-bot-icon:hover {
    transform: scale(1.1);
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0.4);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(14, 203, 129, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0);
    }
}

.bot-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
}

.bot-modal-content {
    background: white;
    border-radius: 16px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
}

.bot-status {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 8px;
}

.bot-status.active {
    background: #0ECB81;
    animation: pulse 1.5s infinite;
}

.bot-status.inactive {
    background: #F6465D;
}

.bot-analysis-item {
    padding: 12px;
    border-bottom: 1px solid #E2E4E8;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.bot-analysis-label {
    font-size: 12px;
    color: #707A8A;
}

.bot-analysis-value {
    font-weight: 600;
    font-size: 13px;
}

.bot-signal-buy {
    color: #0ECB81;
}

.bot-signal-sell {
    color: #F6465D;
}

.bot-signal-neutral {
    color: #F0B90B;
}
    @keyframes slideIn {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
    @keyframes slideIn {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(14,203,129,0.4); }
    70% { box-shadow: 0 0 0 10px rgba(14,203,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(14,203,129,0); }
}
.trading-bot-icon:hover, .chart-bot-icon:hover { transform: scale(1.1); }
.price-up { color: #0ECB81; }
.price-down { color: #F6465D; }
.btn-buy-disabled, .btn-sell-disabled { opacity: 0.5; cursor: not-allowed; }

</style>
{% endblock %}

{% block content %}
<div class="trading-grid">
    <div class="left-column">
        <div class="chart-card">
            <div class="chart-header">
                <div class="symbol-price">
                    <img id="currentCoinIcon" src="" alt="" style="width: 32px; height: 32px; border-radius: 50%;">
                    <div>
                        <span class="symbol-name" id="symbolName">BTC/USDC</span>
                        <div>
                            <span class="current-price" id="currentPrice">$0.00</span>
                            <span class="price-change" id="priceChange">0.00%</span>
                        </div>
                    </div>
                </div>
                <div class="timeframes">
                    <button class="tf-btn" data-tf="1">24h</button>
                    <button class="tf-btn active" data-tf="7">7d</button>
                    <button class="tf-btn" data-tf="30">30d</button>
                    <button class="tf-btn" data-tf="90">90d</button>
                    <button class="tf-btn" data-tf="365">1y</button>
                </div>
            </div>
            <div id="chartContainer">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="order-card">
            <div class="order-tabs">
                <button class="order-tab active" data-tab="limit">Limit Order</button>
                <button class="order-tab" data-tab="market">Market Order</button>
            </div>

            <div id="limitPanel" class="order-form">
                <div class="form-group">
                    <label class="form-label">Price (USDC)</label>
                    <input type="number" id="limitPrice" class="form-input" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label class="form-label">Amount (USDC)</label>
                    <input type="number" id="limitAmount" class="form-input" step="0.01" placeholder="0.00">
                    <div class="perc-group">
                        <button class="perc-btn" data-perc="25">25%</button>
                        <button class="perc-btn" data-perc="50">50%</button>
                        <button class="perc-btn" data-perc="75">75%</button>
                        <button class="perc-btn" data-perc="100">100%</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Total</label>
                    <div class="total-amount" id="limitTotal">$0.00</div>
                </div>
                <button class="btn-buy" id="buyBtn">Buy BTC</button>
                <button class="btn-sell" id="sellBtn">Sell BTC</button>
            </div>

            <div id="marketPanel" class="order-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Amount (USDC)</label>
                    <input type="number" id="marketAmount" class="form-input" placeholder="0.00">
                    <div class="perc-group">
                        <button class="perc-btn" data-market-perc="25">25%</button>
                        <button class="perc-btn" data-market-perc="50">50%</button>
                        <button class="perc-btn" data-market-perc="75">75%</button>
                        <button class="perc-btn" data-market-perc="100">100%</button>
                    </div>
                </div>
                <button class="btn-buy" id="buyBtnMarket">Buy BTC</button>
                <button class="btn-sell" id="sellBtnMarket">Sell BTC</button>
            </div>
        </div>
    </div>

    <div class="right-column">
        <div class="orderbook-card">
            <div class="orderbook-title">Order Book</div>
            <div class="orderbook-header">
                <span>Price (USDC)</span>
                <span>Amount</span>
                <span>Total</span>
            </div>
            <div id="askOrders" style="margin-bottom: 8px;"></div>
            <div id="bidOrders"></div>
        </div>

        <div class="coins-card">
            <div class="orderbook-title">Top Coins</div>
            <div class="coin-list" id="coinList"></div>
            <div class="stats-mini">
                <div class="stat-mini">
                    <div class="stat-mini-label">Your Balance</div>
                    <div class="stat-mini-value" id="userBalance">$0.00</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-label">24h Volume</div>
                    <div class="stat-mini-value" id="globalVolume">$0</div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Bot Analysis Modal -->
<div id="botModal" class="bot-modal" style="display: none;">
    <div class="bot-modal-content">
        <div id="botModalContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'js/trading.js' %}?v=20250409"></script>
<script>
    const API_BASE = '/api';
    const COINGECKO_API = 'https://api.coingecko.com/api/v3';

    let priceChart = null;
    let tokens = [];
    let currentSymbol = 'BTC';
    let currentDays = 7;
    let userBalance = 0;
    let userHoldings = {};
    let currentPrice = 0;
    let userGrandBalance = 0;

    // ============ TRADING BOT SYSTEM ============
    let allBotConfigs = {};
    let botIntervals = {};

    const botConfig = {
        'BTC': { strategy: 'Spot Grid', risk: 'Medium', minAmount: 10, maxAmount: 100 },
        'ETH': { strategy: 'Spot Grid', risk: 'Medium', minAmount: 10, maxAmount: 80 },
        'BNB': { strategy: 'Spot Grid', risk: 'Low', minAmount: 5, maxAmount: 50 },
        'SOL': { strategy: 'Spot Grid', risk: 'High', minAmount: 10, maxAmount: 60 }
    };

    function getBotConfig(symbol, currentPrice) {
        const lowerPrice = currentPrice * 0.85;
        const upperPrice = currentPrice * 1.15;
        return {
            strategy: 'Spot Grid',
            lowerPrice: lowerPrice,
            upperPrice: upperPrice,
            grids: 100,
            risk: currentPrice > 1000 ? 'High' : (currentPrice < 10 ? 'Low' : 'Medium'),
            priceRange: upperPrice - lowerPrice,
            gridStep: (upperPrice - lowerPrice) / 100
        };
    }

    function initBotForToken(symbol, currentPrice) {
        if (!allBotConfigs[symbol]) {
            allBotConfigs[symbol] = getBotConfig(symbol, currentPrice);
        }
    }

    function showTradeSignal(symbol, action, amount, price) {
        const popup = document.createElement('div');
        popup.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            background: ${action === 'BUY' ? '#0ECB81' : '#F6465D'};
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            z-index: 10001;
            animation: slideInRight 0.5s ease, fadeOut 0.5s ease 3s forwards;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            min-width: 250px;
        `;
        popup.innerHTML = `<div style="display: flex; align-items: center; gap: 10px;">
            <div style="font-size: 24px;">${action === 'BUY' ? '🟢' : '🔴'}</div>
            <div><div style="font-weight: bold;">${action} SIGNAL</div><div>${symbol} | ${amount} USDC</div><div style="font-size: 11px;">Price: ${formatCurrency(price)}</div></div>
        </div>`;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 3500);
    }

    function startBotForSymbol(symbol) {
        if (botIntervals[symbol]) clearInterval(botIntervals[symbol]);
        botIntervals[symbol] = setInterval(() => {
            const isBuy = Math.random() > 0.7;
            const amount = (Math.random() * 90 + 10).toFixed(2);
            showTradeSignal(symbol, isBuy ? 'BUY' : 'SELL', amount, currentPrice || 100);
        }, 60000);
    }

    function startAllBots() {
        if (tokens && tokens.length > 0) {
            tokens.forEach(token => {
                initBotForToken(token.symbol, token.current_price);
                startBotForSymbol(token.symbol);
            });
        }
    }

    function showBotAnalysis(symbol, currentPrice, change24h) {
        initBotForToken(symbol, currentPrice);
        const config = allBotConfigs[symbol];
        const gridStep = config.gridStep;
        const currentGridLevel = Math.floor((currentPrice - config.lowerPrice) / gridStep);
        let gridProgress = ((currentPrice - config.lowerPrice) / config.priceRange) * 100;
        gridProgress = Math.min(100, Math.max(0, gridProgress));

        let modal = document.getElementById('botModal');
        if (modal) modal.remove();

        modal = document.createElement('div');
        modal.id = 'botModal';
        modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;';
        modal.innerHTML = `
            <div style="background:white;border-radius:16px;max-width:450px;width:90%;padding:20px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                    <h3 style="margin:0;">🤖 Spot Grid - ${symbol}</h3>
                    <button onclick="this.closest('#botModal').remove()" style="background:none;border:none;font-size:24px;cursor:pointer;">×</button>
                </div>
                <div style="margin-bottom:15px;padding:12px;background:#F8F9FA;border-radius:12px;">
                    <div><strong>${symbol}</strong> | Current: ${formatCurrency(currentPrice)} | 24h: ${change24h >= 0 ? '+' : ''}${change24h.toFixed(2)}%</div>
                </div>
                <div style="padding:16px;background:linear-gradient(135deg, #1E2329 0%, #2B3139 100%);border-radius:12px;color:white;">
                    <div style="text-align:center;margin-bottom:12px;"><strong>⚡ SPOT GRID</strong></div>
                    <div style="display:flex;justify-content:space-between;">
                        <div>Lower: ${formatCurrency(config.lowerPrice)}</div>
                        <div>Upper: ${formatCurrency(config.upperPrice)}</div>
                    </div>
                    <div style="margin:10px 0;"><div style="height:6px;background:#3A4149;border-radius:3px;"><div style="width:${gridProgress}%;height:100%;background:#F0B90B;border-radius:3px;"></div></div></div>
                    <div style="display:flex;justify-content:space-between;">
                        <div>Grids: ${config.grids}</div>
                        <div>Risk: ${config.risk}</div>
                        <div>Grid Size: ${formatCurrency(gridStep)}</div>
                    </div>
                </div>
                <div style="margin-top:15px;text-align:center;font-size:11px;color:#707A8A;">🤖 Bot permanently active • 24/7</div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }

    function addBotIconsToTradingCoins() {
        document.querySelectorAll('.coin-item').forEach(card => {
            const symbolElem = card.querySelector('.coin-symbol');
            if (!symbolElem || card.querySelector('.trading-bot-icon')) return;
            const symbol = symbolElem.innerText;
            const priceElem = card.querySelector('.coin-price');
            const price = parseFloat(priceElem?.innerText?.replace('$', '').replace(/,/g, '') || 0);
            const changeElem = card.querySelector('.coin-change');
            const change = parseFloat(changeElem?.innerText) || 0;

            const icon = document.createElement('div');
            icon.className = 'trading-bot-icon';
            icon.innerHTML = '🤖';
            icon.style.cssText = 'position:absolute;top:8px;right:8px;width:28px;height:28px;background:#0ECB81;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:10;box-shadow:0 0 10px rgba(14,203,129,0.5);animation:pulse 2s infinite;';
            icon.onclick = (e) => { e.stopPropagation(); showBotAnalysis(symbol, price, change); };
            card.style.position = 'relative';
            card.appendChild(icon);
        });
    }

    function addChartBotIcon() {
        const container = document.querySelector('.chart-header .symbol-price');
        if (container && !document.querySelector('.chart-bot-icon')) {
            const icon = document.createElement('div');
            icon.className = 'chart-bot-icon';
            icon.innerHTML = '🤖';
            icon.style.cssText = 'width:32px;height:32px;background:#0ECB81;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:15px;box-shadow:0 0 10px rgba(14,203,129,0.5);animation:pulse 2s infinite;';
            icon.onclick = () => showBotAnalysis(currentSymbol, currentPrice, 0);
            container.appendChild(icon);
        }
    }

    function getTokenIcon(symbol) {
        const icons = {
            'BTC': 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png',
            'ETH': 'https://assets.coingecko.com/coins/images/279/small/ethereum.png',
            'BNB': 'https://assets.coingecko.com/coins/images/825/small/bnb-icon2.png',
            'SOL': 'https://assets.coingecko.com/coins/images/4128/small/solana.png'
        };
        return icons[symbol] || 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png';
    }

    const symbolToCoinGeckoId = {
        'BTC': 'bitcoin', 'ETH': 'ethereum', 'BNB': 'binancecoin', 'SOL': 'solana'
    };

    function getToken() { return localStorage.getItem('access_token'); }

    async function apiCall(endpoint, method = 'GET', data = null) {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const options = { method, headers };
        if (data) options.body = JSON.stringify(data);
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        if (response.status === 401) window.location.href = '/login/';
        return response.json();
    }

    function formatCurrency(num) {
        if (!num) return '$0.00';
        const value = parseFloat(num);
        if (isNaN(value)) return '$0.00';
        if (value === 0) return '$0.00';
        if (Math.abs(value) < 0.01) return `$${value.toFixed(8)}`;
        if (value >= 1e9) return `$${(value / 1e9).toFixed(2)}B`;
        if (value >= 1e6) return `$${(value / 1e6).toFixed(2)}M`;
        return `$${value.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}`;
    }

    function formatNumber(num, decimals = 6) {
        if (!num) return '0';
        const value = parseFloat(num);
        if (isNaN(value)) return '0';
        if (value === 0) return '0';
        if (Math.abs(value) < 0.01) return value.toFixed(8);
        return value.toFixed(decimals);
    }

    async function updateChart() {
        if (!currentSymbol) return;
        const chartContainer = document.getElementById('chartContainer');
        if (!chartContainer) return;
        chartContainer.innerHTML = '<div class="loading-chart">Loading chart...</div><canvas id="priceChart" style="display:none;"></canvas>';
        const coinId = symbolToCoinGeckoId[currentSymbol];
        if (!coinId) { chartContainer.innerHTML = '<div class="loading-chart">Coin not found</div>'; return; }
        try {
            const response = await fetch(`${COINGECKO_API}/coins/${coinId}/market_chart?vs_currency=usd&days=${currentDays}`);
            const data = await response.json();
            if (!data?.prices?.length) { chartContainer.innerHTML = '<div class="loading-chart">No data</div>'; return; }
            const prices = data.prices;
            const labels = [], priceValues = [];
            for (let i = 0; i < prices.length; i++) {
                const date = new Date(prices[i][0]);
                labels.push(currentDays <= 2 ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : date.toLocaleDateString([], { month: 'short', day: 'numeric' }));
                priceValues.push(prices[i][1]);
            }
            chartContainer.innerHTML = '<canvas id="priceChart"></canvas>';
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (priceChart) priceChart.destroy();
            const lastPrice = priceValues[priceValues.length - 1];
            const changePercent = ((lastPrice - priceValues[0]) / priceValues[0]) * 100;
            document.getElementById('currentPrice').innerHTML = formatCurrency(lastPrice);
            document.getElementById('priceChange').innerHTML = `${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%`;
            document.getElementById('priceChange').className = `price-change ${changePercent >= 0 ? 'price-up' : 'price-down'}`;
            document.getElementById('symbolName').innerHTML = `${currentSymbol}/USDC`;
            document.getElementById('currentCoinIcon').src = getTokenIcon(currentSymbol);
            currentPrice = lastPrice;
            priceChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: `${currentSymbol} Price`, data: priceValues, borderColor: '#1E2329', fill: true, tension: 0.2 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
            });
            addChartBotIcon();
        } catch (error) { console.error(error); chartContainer.innerHTML = '<div class="loading-chart">Error</div>'; }
    }

    function generateOrderBook(price) {
        let bids = [], asks = [];
        for (let i = 0; i < 5; i++) {
            bids.push({ price: price * (1 - (0.0005 + i * 0.0005)), size: 0.5 + Math.random() * 3 });
            asks.push({ price: price * (1 + (0.0005 + i * 0.0005)), size: 0.5 + Math.random() * 3 });
        }
        let bidTotal = 0, askTotal = 0;
        return { bids: bids.map(b => ({ ...b, total: bidTotal += b.size })), asks: asks.map(a => ({ ...a, total: askTotal += a.size })) };
    }

    function renderOrderBook() {
        if (!currentPrice) return;
        const book = generateOrderBook(currentPrice);
        document.getElementById('askOrders').innerHTML = book.asks.map(a => `<div class="orderbook-row" onclick="setPrice(${a.price})"><span class="ask-price">${formatCurrency(a.price)}</span><span>${formatNumber(a.size)}</span><span>${formatNumber(a.total)}</span></div>`).join('');
        document.getElementById('bidOrders').innerHTML = book.bids.map(b => `<div class="orderbook-row" onclick="setPrice(${b.price})"><span class="bid-price">${formatCurrency(b.price)}</span><span>${formatNumber(b.size)}</span><span>${formatNumber(b.total)}</span></div>`).join('');
    }

    async function updateButtonState() {
        try {
            const balance = await apiCall('/trading/my_balance/');
            userGrandBalance = parseFloat(balance.grand_balance) || 0;
            const buyBtn = document.getElementById('buyBtn');
            const sellBtn = document.getElementById('sellBtn');
            if (userGrandBalance <= 0) buyBtn?.classList.add('btn-buy-disabled');
            else buyBtn?.classList.remove('btn-buy-disabled');
            const holdings = await apiCall('/trading/my_tokens/');
            const hasToken = holdings.some(h => h.token_symbol === currentSymbol && parseFloat(h.quantity) > 0);
            if (!hasToken) sellBtn?.classList.add('btn-sell-disabled');
            else sellBtn?.classList.remove('btn-sell-disabled');
        } catch (e) { console.error(e); }
    }

    async function loadCoins() {
        try {
            tokens = await apiCall('/trading/');
            const container = document.getElementById('coinList');
            if (container) {
                container.innerHTML = tokens.slice(0, 10).map(token => {
                    const change = (Math.random() - 0.5) * 8;
                    return `<div class="coin-item" onclick="selectCoin('${token.symbol}')"><div class="coin-info"><img src="${getTokenIcon(token.symbol)}" style="width:28px;height:28px;border-radius:50%;"><div><div class="coin-symbol">${token.symbol}</div><div class="coin-name">${token.name}</div></div></div><div style="text-align:right;"><div class="coin-price">${formatCurrency(token.current_price)}</div><div class="coin-change ${change >= 0 ? 'price-up' : 'price-down'}">${change >= 0 ? '+' : ''}${Math.abs(change).toFixed(2)}%</div></div></div>`;
                }).join('');
            }
            const currentToken = tokens.find(t => t.symbol === currentSymbol);
            if (currentToken) currentPrice = parseFloat(currentToken.current_price);
            await updateButtonState();
            startAllBots();
            setTimeout(() => { addBotIconsToTradingCoins(); addChartBotIcon(); }, 500);
        } catch (e) { console.error(e); }
    }

    function selectCoin(symbol) {
        currentSymbol = symbol;
        const token = tokens.find(t => t.symbol === symbol);
        if (token) {
            currentPrice = parseFloat(token.current_price);
            document.getElementById('currentPrice').innerHTML = formatCurrency(currentPrice);
            document.getElementById('currentCoinIcon').src = getTokenIcon(symbol);
            document.getElementById('symbolName').innerHTML = `${symbol}/USDC`;
            updateChart();
            renderOrderBook();
            updateButtonState();
            setTimeout(() => addChartBotIcon(), 500);
        }
        document.getElementById('buyBtn').innerHTML = `Buy ${symbol}`;
        document.getElementById('sellBtn').innerHTML = `Sell ${symbol}`;
    }
    window.selectCoin = selectCoin;

    async function loadUserData() {
        try {
            const balance = await apiCall('/trading/my_balance/');
            userBalance = parseFloat(balance.grand_balance);
            document.getElementById('userBalance').innerHTML = formatCurrency(userBalance);
            const holdings = await apiCall('/trading/my_tokens/');
            userHoldings = {};
            holdings.forEach(h => { userHoldings[h.token_symbol] = parseFloat(h.quantity); });
            await updateButtonState();
        } catch (e) { console.error(e); }
    }

    function setPrice(price) { document.getElementById('limitPrice').value = price.toFixed(2); }
    window.setPrice = setPrice;

    async function executeBuy() {
        if (userGrandBalance <= 0) { alert('Insufficient balance'); return; }
        const token = tokens.find(t => t.symbol === currentSymbol);
        if (!token) return;
        const amount = parseFloat(document.getElementById('limitAmount').value) || parseFloat(document.getElementById('marketAmount').value);
        if (!amount || amount <= 0) { alert('Enter amount'); return; }
        if (amount > userGrandBalance) { alert(`Insufficient balance: ${formatCurrency(userGrandBalance)}`); return; }
        try {
            const result = await apiCall('/trading/buy/', 'POST', { token_id: token.id, amount_usdc: amount });
            if (result.success) { alert(`Bought ${result.purchase.quantity} ${currentSymbol}`); await loadUserData(); await updateButtonState(); }
            else alert('Purchase failed');
        } catch (e) { alert('Error: ' + e.message); }
    }

    async function executeSell() {
        const token = tokens.find(t => t.symbol === currentSymbol);
        if (!token) return;
        const userQty = userHoldings[currentSymbol] || 0;
        if (userQty === 0) { alert(`No ${currentSymbol} to sell`); return; }
        const amount = parseFloat(document.getElementById('limitAmount').value) || parseFloat(document.getElementById('marketAmount').value);
        if (!amount || amount <= 0) { alert('Enter amount'); return; }
        const quantity = amount / parseFloat(token.current_price);
        if (quantity > userQty) { alert(`Insufficient: ${formatNumber(userQty)} ${currentSymbol}`); return; }
        try {
            const result = await apiCall('/trading/sell/', 'POST', { token_id: token.id, quantity: quantity });
            if (result.success) { alert(`Sold ${result.sale.quantity} ${currentSymbol}`); await loadUserData(); await updateButtonState(); }
            else alert('Sale failed');
        } catch (e) { alert('Error: ' + e.message); }
    }

    document.getElementById('limitAmount')?.addEventListener('input', function() { document.getElementById('limitTotal').innerHTML = formatCurrency(parseFloat(this.value) || 0); });
    document.getElementById('buyBtn')?.addEventListener('click', executeBuy);
    document.getElementById('sellBtn')?.addEventListener('click', executeSell);
    document.getElementById('buyBtnMarket')?.addEventListener('click', executeBuy);
    document.getElementById('sellBtnMarket')?.addEventListener('click', executeSell);

    // Add CSS animations
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(14,203,129,0.4); } 70% { box-shadow: 0 0 0 10px rgba(14,203,129,0); } 100% { box-shadow: 0 0 0 0 rgba(14,203,129,0); } }
        .price-up { color: #0ECB81; } .price-down { color: #F6465D; }
        .trading-bot-icon:hover, .chart-bot-icon:hover { transform: scale(1.1); }
        .btn-buy-disabled, .btn-sell-disabled { opacity: 0.5; cursor: not-allowed; }
    `;
    document.head.appendChild(style);

    async function init() {
        await loadCoins();
        await loadUserData();
        await updateChart();
        renderOrderBook();
        updateButtonState();
        setInterval(() => renderOrderBook(), 3000);
        setInterval(async () => { await loadCoins(); await loadUserData(); await updateChart(); }, 120000);
    }
    init();
</script>
{% endblock %}
