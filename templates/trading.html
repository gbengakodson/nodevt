{% extends 'base/base.html' %}

{% block title %}Trading - BTC/USDC{% endblock %}

{% block extra_css %}
<style>
    .trading-grid {
        display: flex;
        gap: 20px;
        max-width: 1400px;
        margin: 0 auto;
    }

    .left-column {
        flex: 2;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .right-column {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .chart-card, .order-card, .orderbook-card, .coins-card {
        background: white;
        border-radius: 12px;
        border: 1px solid #E2E4E8;
        overflow: hidden;
    }

    .chart-card {
        padding: 20px;
    }

    .orderbook-card, .coins-card {
        padding: 16px;
    }

    .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .symbol-price {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .symbol-name {
        font-size: 20px;
        font-weight: 600;
        color: #1E2329;
    }

    .current-price {
        font-size: 28px;
        font-weight: 600;
        color: #1E2329;
    }

    .price-change {
        font-size: 14px;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 500;
    }

    .price-up {
        color: #0ECB81;
        background: rgba(14, 203, 129, 0.1);
    }

    .price-down {
        color: #F6465D;
        background: rgba(246, 70, 93, 0.1);
    }

    .timeframes {
        display: flex;
        gap: 4px;
        background: #F8F9FA;
        padding: 4px;
        border-radius: 8px;
        flex-wrap: wrap;
    }

    .tf-btn {
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 500;
        background: none;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .tf-btn:hover {
        color: #1E2329;
        background: #EFF2F5;
    }

    .tf-btn.active {
        background: #EFF2F5;
        color: #1E2329;
    }

    #priceChart {
        width: 100%;
        height: 420px;
    }

    .order-tabs {
        display: flex;
        border-bottom: 1px solid #E2E4E8;
    }

    .order-tab {
        flex: 1;
        padding: 14px;
        text-align: center;
        background: none;
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .order-tab:hover {
        color: #1E2329;
    }

    .order-tab.active {
        color: #1E2329;
        border-bottom: 2px solid #1E2329;
    }

    .order-form {
        padding: 20px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        font-size: 12px;
        color: #707A8A;
        margin-bottom: 8px;
        display: block;
    }

    .form-input {
        width: 100%;
        padding: 12px;
        background: #F8F9FA;
        border: 1px solid #E2E4E8;
        border-radius: 8px;
        font-size: 14px;
        color: #1E2329;
        transition: all 0.2s;
    }

    .form-input:focus {
        outline: none;
        border-color: #D9DDE2;
        background: white;
    }

    .perc-group {
        display: flex;
        gap: 8px;
        margin-top: 10px;
    }

    .perc-btn {
        flex: 1;
        background: #F8F9FA;
        border: 1px solid #E2E4E8;
        border-radius: 6px;
        padding: 6px;
        font-size: 11px;
        cursor: pointer;
        color: #707A8A;
        transition: all 0.2s;
    }

    .perc-btn:hover {
        background: #EFF2F5;
        color: #1E2329;
        border-color: #D9DDE2;
    }

    .btn-buy {
        width: 100%;
        background: #0ECB81;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        margin-top: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-buy-disabled {
        background: #E2E4E8;
        color: #707A8A;
        cursor: not-allowed;
    }

    .btn-sell {
        width: 100%;
        background: #F6465D;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        margin-top: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-sell-disabled {
        background: #E2E4E8;
        color: #707A8A;
        cursor: not-allowed;
    }

    .orderbook-title {
        font-weight: 600;
        margin-bottom: 16px;
        font-size: 14px;
        color: #1E2329;
    }

    .orderbook-header {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #E2E4E8;
        font-size: 11px;
        color: #707A8A;
        text-transform: uppercase;
    }

    .orderbook-row {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 12px;
        font-family: monospace;
        cursor: pointer;
        transition: background 0.1s;
        border-radius: 4px;
    }

    .orderbook-row:hover {
        background: #F8F9FA;
    }

    .bid-price {
        color: #0ECB81;
    }

    .ask-price {
        color: #F6465D;
    }

    .coin-list {
        max-height: 380px;
        overflow-y: auto;
    }

    .coin-list::-webkit-scrollbar {
        width: 4px;
    }

    .coin-list::-webkit-scrollbar-track {
        background: #E2E4E8;
        border-radius: 4px;
    }

    .coin-list::-webkit-scrollbar-thumb {
        background: #D9DDE2;
        border-radius: 4px;
    }

    .coin-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        border-bottom: 1px solid #E2E4E8;
        cursor: pointer;
        transition: background 0.2s;
        border-radius: 8px;
    }

    .coin-item:hover {
        background: #F8F9FA;
    }

    .coin-info {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .coin-symbol {
        font-weight: 600;
        font-size: 13px;
        color: #1E2329;
    }

    .coin-name {
        font-size: 10px;
        color: #707A8A;
        margin-top: 2px;
    }

    .coin-price {
        font-weight: 500;
        font-size: 12px;
        color: #1E2329;
    }

    .coin-change {
        font-size: 11px;
        font-weight: 500;
        margin-top: 2px;
        text-align: right;
    }

    .stats-mini {
        display: flex;
        justify-content: space-between;
        background: #F8F9FA;
        border-radius: 8px;
        padding: 12px;
        margin-top: 16px;
    }

    .stat-mini {
        text-align: center;
        flex: 1;
    }

    .stat-mini-label {
        font-size: 10px;
        color: #707A8A;
    }

    .stat-mini-value {
        font-size: 13px;
        font-weight: 600;
        color: #1E2329;
        margin-top: 4px;
    }

    .total-amount {
        font-size: 20px;
        font-weight: 600;
        color: #1E2329;
    }

    .loading-chart {
        text-align: center;
        padding: 180px;
        color: #707A8A;
    }

    @media (max-width: 992px) {
        .trading-grid {
            flex-direction: column;
        }
        #priceChart {
            height: 320px;
        }
        .loading-chart {
            padding: 100px;
        }
        .timeframes {
            width: 100%;
            justify-content: center;
        }
        .coin-list {
            max-height: 250px;
        }
        .coin-info img {
            width: 28px;
            height: 28px;
        }
    }

    /* Trading Bot Styles */
.trading-bot-icon {
    width: 28px;
    height: 28px;
    background: #0ECB81;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    animation: pulse 2s infinite;
}

.trading-bot-icon.bot-active {
    background: #0ECB81;
    box-shadow: 0 0 10px rgba(14, 203, 129, 0.5);
}

.trading-bot-icon.bot-inactive {
    background: #707A8A;
}

.trading-bot-icon:hover {
    transform: scale(1.1);
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0.4);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(14, 203, 129, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0);
    }
}

.bot-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
}

.bot-modal-content {
    background: white;
    border-radius: 16px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
}

.bot-status {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 8px;
}

.bot-status.active {
    background: #0ECB81;
    animation: pulse 1.5s infinite;
}

.bot-status.inactive {
    background: #F6465D;
}

.bot-analysis-item {
    padding: 12px;
    border-bottom: 1px solid #E2E4E8;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.bot-analysis-label {
    font-size: 12px;
    color: #707A8A;
}

.bot-analysis-value {
    font-weight: 600;
    font-size: 13px;
}

.bot-signal-buy {
    color: #0ECB81;
}

.bot-signal-sell {
    color: #F6465D;
}

.bot-signal-neutral {
    color: #F0B90B;
}
    @keyframes slideIn {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
    @keyframes slideIn {
    from {
        transform: translateX(-100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0.4);
    }
    70% {
        box-shadow: 0 0 0 10px rgba(14, 203, 129, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(14, 203, 129, 0);
    }
}
</style>
{% endblock %}

{% block content %}
<div class="trading-grid">
    <div class="left-column">
        <div class="chart-card">
            <div class="chart-header">
                <div class="symbol-price">
                    <img id="currentCoinIcon" src="" alt="" style="width: 32px; height: 32px; border-radius: 50%;">
                    <div>
                        <span class="symbol-name" id="symbolName">BTC/USDC</span>
                        <div>
                            <span class="current-price" id="currentPrice">$0.00</span>
                            <span class="price-change" id="priceChange">0.00%</span>
                        </div>
                    </div>
                </div>
                <div class="timeframes">
                    <button class="tf-btn" data-tf="1">24h</button>
                    <button class="tf-btn active" data-tf="7">7d</button>
                    <button class="tf-btn" data-tf="30">30d</button>
                    <button class="tf-btn" data-tf="90">90d</button>
                    <button class="tf-btn" data-tf="365">1y</button>
                </div>
            </div>
            <div id="chartContainer">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="order-card">
            <div class="order-tabs">
                <button class="order-tab active" data-tab="limit">Limit Order</button>
                <button class="order-tab" data-tab="market">Market Order</button>
            </div>

            <div id="limitPanel" class="order-form">
                <div class="form-group">
                    <label class="form-label">Price (USDC)</label>
                    <input type="number" id="limitPrice" class="form-input" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label class="form-label">Amount (USDC)</label>
                    <input type="number" id="limitAmount" class="form-input" step="0.01" placeholder="0.00">
                    <div class="perc-group">
                        <button class="perc-btn" data-perc="25">25%</button>
                        <button class="perc-btn" data-perc="50">50%</button>
                        <button class="perc-btn" data-perc="75">75%</button>
                        <button class="perc-btn" data-perc="100">100%</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Total</label>
                    <div class="total-amount" id="limitTotal">$0.00</div>
                </div>
                <button class="btn-buy" id="buyBtn">Buy BTC</button>
                <button class="btn-sell" id="sellBtn">Sell BTC</button>
            </div>

            <div id="marketPanel" class="order-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label">Amount (USDC)</label>
                    <input type="number" id="marketAmount" class="form-input" placeholder="0.00">
                    <div class="perc-group">
                        <button class="perc-btn" data-market-perc="25">25%</button>
                        <button class="perc-btn" data-market-perc="50">50%</button>
                        <button class="perc-btn" data-market-perc="75">75%</button>
                        <button class="perc-btn" data-market-perc="100">100%</button>
                    </div>
                </div>
                <button class="btn-buy" id="buyBtnMarket">Buy BTC</button>
                <button class="btn-sell" id="sellBtnMarket">Sell BTC</button>
            </div>
        </div>
    </div>

    <div class="right-column">
        <div class="orderbook-card">
            <div class="orderbook-title">Order Book</div>
            <div class="orderbook-header">
                <span>Price (USDC)</span>
                <span>Amount</span>
                <span>Total</span>
            </div>
            <div id="askOrders" style="margin-bottom: 8px;"></div>
            <div id="bidOrders"></div>
        </div>

        <div class="coins-card">
            <div class="orderbook-title">Top Coins</div>
            <div class="coin-list" id="coinList"></div>
            <div class="stats-mini">
                <div class="stat-mini">
                    <div class="stat-mini-label">Your Balance</div>
                    <div class="stat-mini-value" id="userBalance">$0.00</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-label">24h Volume</div>
                    <div class="stat-mini-value" id="globalVolume">$0</div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Bot Analysis Modal -->
<div id="botModal" class="bot-modal" style="display: none;">
    <div class="bot-modal-content">
        <div id="botModalContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const API_BASE = '/api';
    const COINGECKO_API = 'https://api.coingecko.com/api/v3';

    let priceChart = null;
    let tokens = [];
    let currentSymbol = 'BTC';
    let currentDays = 7;
    let userBalance = 0;
    let userHoldings = {};
    let currentPrice = 0;
    let userGrandBalance = 0;

    // Trading Bot System
    let tradingBotActive = {};
    let botIntervals = {};
    let botTradeSimulations = {};

    const botConfig = {
        'BTC': { strategy: 'Scalping + Trend Following', risk: 'Medium', profitTarget: 5, stopLoss: 2, minAmount: 10, maxAmount: 100 },
        'ETH': { strategy: 'Grid Trading', risk: 'Medium', profitTarget: 4, stopLoss: 1.5, minAmount: 10, maxAmount: 80 },
        'BNB': { strategy: 'Arbitrage', risk: 'Low', profitTarget: 3, stopLoss: 1, minAmount: 5, maxAmount: 50 },
        'SOL': { strategy: 'Momentum', risk: 'High', profitTarget: 8, stopLoss: 3, minAmount: 10, maxAmount: 60 },
        'XRP': { strategy: 'Range Trading', risk: 'Low', profitTarget: 2, stopLoss: 1, minAmount: 5, maxAmount: 40 },
        'ADA': { strategy: 'DCA', risk: 'Low', profitTarget: 3, stopLoss: 1.5, minAmount: 5, maxAmount: 35 },
        'DOGE': { strategy: 'Meme Momentum', risk: 'High', profitTarget: 10, stopLoss: 5, minAmount: 5, maxAmount: 30 },
        'AVAX': { strategy: 'Breakout', risk: 'Medium', profitTarget: 6, stopLoss: 2.5, minAmount: 10, maxAmount: 50 }
    };

    // Crypto icons
    function getTokenIcon(symbol) {
        const icons = {
            'BTC': 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png',
            'ETH': 'https://assets.coingecko.com/coins/images/279/small/ethereum.png',
            'BNB': 'https://assets.coingecko.com/coins/images/825/small/bnb-icon2.png',
            'SOL': 'https://assets.coingecko.com/coins/images/4128/small/solana.png',
            'XRP': 'https://assets.coingecko.com/coins/images/44/small/xrp-symbol-white-128.png',
            'ADA': 'https://assets.coingecko.com/coins/images/975/small/cardano.png',
            'DOGE': 'https://assets.coingecko.com/coins/images/5/small/dogecoin.png',
            'AVAX': 'https://assets.coingecko.com/coins/images/12559/small/avalanche.png',
            'DOT': 'https://assets.coingecko.com/coins/images/12171/small/polkadot.png',
            'NEAR': 'https://assets.coingecko.com/coins/images/10365/small/near.png',
            'LTC': 'https://assets.coingecko.com/coins/images/2/small/litecoin.png',
            'THETA': 'https://assets.coingecko.com/coins/images/2538/small/theta-token.png',
            'PEPE': 'https://assets.coingecko.com/coins/images/29850/small/pepe-token.jpeg',
            'LINK': 'https://assets.coingecko.com/coins/images/877/small/chainlink-new-logo.png'
        };
        return icons[symbol] || 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png';
    }

    const symbolToCoinGeckoId = {
        'BTC': 'bitcoin',
        'ETH': 'ethereum',
        'BNB': 'binancecoin',
        'SOL': 'solana',
        'XRP': 'ripple',
        'ADA': 'cardano',
        'DOGE': 'dogecoin',
        'AVAX': 'avalanche-2',
        'DOT': 'polkadot',
        'PEPE': 'pepe',
        'LINK': 'chainlink',
        'LTC': 'litecoin',
        'NEAR': 'near'
    };

    function getToken() { return localStorage.getItem('access_token'); }

    async function apiCall(endpoint, method = 'GET', data = null) {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const options = { method, headers };
        if (data) options.body = JSON.stringify(data);
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        if (response.status === 401) window.location.href = '/login/';
        return response.json();
    }

    function formatCurrency(num) {
        if (!num) return '$0.00';
        const value = parseFloat(num);
        if (isNaN(value)) return '$0.00';
        if (value === 0) return '$0.00';
        if (Math.abs(value) < 0.01 && Math.abs(value) > 0) return `$${value.toFixed(8)}`;
        if (value >= 1e9) return `$${(value / 1e9).toFixed(2)}B`;
        if (value >= 1e6) return `$${(value / 1e6).toFixed(2)}M`;
        return `$${value.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}`;
    }

    function formatNumber(num, decimals = 6) {
        if (!num) return '0';
        const value = parseFloat(num);
        if (isNaN(value)) return '0';
        if (value === 0) return '0';
        if (Math.abs(value) < 0.01 && Math.abs(value) > 0) return value.toFixed(8);
        return value.toFixed(decimals);
    }

    // Generate bot analysis
    function generateBotAnalysis(symbol, change24h) {
        const config = botConfig[symbol] || botConfig['BTC'];
        let signal = 'NEUTRAL';
        let signalColor = 'bot-neutral';
        let confidence = 65;

        if (change24h > 5) { signal = 'SELL'; signalColor = 'bot-sell'; confidence = 80; }
        else if (change24h > 2) { signal = 'SELL'; signalColor = 'bot-sell'; confidence = 65; }
        else if (change24h < -5) { signal = 'BUY'; signalColor = 'bot-buy'; confidence = 80; }
        else if (change24h < -2) { signal = 'BUY'; signalColor = 'bot-buy'; confidence = 65; }

        const rsi = 30 + Math.random() * 70;
        const macd = (Math.random() - 0.5) * 2;

        return {
            signal: signal, signalColor: signalColor, confidence: confidence,
            strategy: config.strategy, risk: config.risk,
            profitTarget: config.profitTarget, stopLoss: config.stopLoss,
            rsi: Math.floor(rsi), macd: macd.toFixed(2),
            trades: botTradeSimulations[symbol]?.length || 0
        };
    }

    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.cssText = `position:fixed;bottom:20px;left:20px;background:${type === 'buy' ? '#0ECB81' : '#F6465D'};color:white;padding:10px 20px;border-radius:8px;z-index:10000;`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function toggleBot(symbol) {
        tradingBotActive[symbol] = !tradingBotActive[symbol];
        updateBotIcons(symbol);
        showToast(`🤖 Bot ${tradingBotActive[symbol] ? 'activated' : 'stopped'} for ${symbol}`, tradingBotActive[symbol] ? 'buy' : 'sell');

        if (tradingBotActive[symbol]) {
            if (botIntervals[symbol]) clearInterval(botIntervals[symbol]);
            botIntervals[symbol] = setInterval(() => {
                if (!tradingBotActive[symbol]) return;
                const config = botConfig[symbol] || botConfig['BTC'];
                const amount = (Math.random() * (config.maxAmount - config.minAmount) + config.minAmount).toFixed(2);
                const isBuy = Math.random() > 0.7;
                showToast(`${isBuy ? '🟢 BOT BUY' : '🔴 BOT SELL'}: ${amount} USDC of ${symbol}`, isBuy ? 'buy' : 'sell');
            }, 60000);
        } else if (botIntervals[symbol]) {
            clearInterval(botIntervals[symbol]);
            delete botIntervals[symbol];
        }
    }

    function updateBotIcons(symbol) {
        const isActive = tradingBotActive[symbol];
        document.querySelectorAll(`.bot-icon[data-symbol="${symbol}"]`).forEach(icon => {
            icon.style.background = isActive ? '#0ECB81' : '#707A8A';
            icon.style.boxShadow = isActive ? '0 0 10px rgba(14,203,129,0.5)' : 'none';
        });
    }

    function showBotModal(symbol, price, change) {
        const analysis = generateBotAnalysis(symbol, change);
        const isActive = tradingBotActive[symbol];

        let modal = document.getElementById('botModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'botModal';
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:10000;display:none;align-items:center;justify-content:center;';
            modal.innerHTML = `
                <div style="background:white;border-radius:16px;max-width:400px;width:90%;padding:20px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                        <h3 id="botModalTitle">🤖 Bot</h3>
                        <button onclick="document.getElementById('botModal').style.display='none'" style="background:none;border:none;font-size:24px;cursor:pointer;">×</button>
                    </div>
                    <div id="botModalBody"></div>
                    <button id="botModalAction" style="width:100%;padding:12px;border:none;border-radius:8px;color:white;cursor:pointer;margin-top:15px;"></button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        document.getElementById('botModalBody').innerHTML = `
            <div style="margin-bottom:15px;"><strong>Signal:</strong> <span class="${analysis.signalColor}">${analysis.signal}</span></div>
            <div style="margin-bottom:15px;"><strong>Confidence:</strong> ${analysis.confidence}%</div>
            <div style="margin-bottom:15px;"><strong>Strategy:</strong> ${analysis.strategy}</div>
            <div style="margin-bottom:15px;"><strong>Risk:</strong> ${analysis.risk}</div>
            <div style="margin-bottom:15px;"><strong>RSI:</strong> ${analysis.rsi}</div>
            <div style="margin-bottom:15px;"><strong>MACD:</strong> ${analysis.macd}</div>
            <div><strong>Target:</strong> +${analysis.profitTarget}% | <strong>Stop:</strong> -${analysis.stopLoss}%</div>
        `;

        const actionBtn = document.getElementById('botModalAction');
        actionBtn.textContent = isActive ? 'Stop Bot' : 'Start Bot';
        actionBtn.style.background = isActive ? '#F6465D' : '#0ECB81';
        actionBtn.onclick = () => { toggleBot(symbol); document.getElementById('botModal').style.display = 'none'; };

        document.getElementById('botModalTitle').innerHTML = `🤖 ${symbol} Trading Bot`;
        modal.style.display = 'flex';
    }

    function addChartBotIcon() {
        const container = document.querySelector('.chart-header .symbol-price');
        if (container && !document.querySelector('.chart-bot-icon')) {
            const icon = document.createElement('div');
            icon.className = 'chart-bot-icon bot-icon';
            icon.setAttribute('data-symbol', currentSymbol);
            icon.innerHTML = '🤖';
            icon.style.cssText = 'width:32px;height:32px;background:#707A8A;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:15px;';
            icon.onclick = () => showBotModal(currentSymbol, currentPrice, 0);
            container.appendChild(icon);
        }
    }

    function addCardBotIcons() {
        document.querySelectorAll('.coin-item').forEach(card => {
            const symbolElem = card.querySelector('.coin-symbol');
            if (!symbolElem) return;
            const symbol = symbolElem.innerText;
            if (!card.querySelector('.card-bot-icon')) {
                const icon = document.createElement('div');
                icon.className = 'card-bot-icon bot-icon';
                icon.setAttribute('data-symbol', symbol);
                icon.innerHTML = '🤖';
                icon.style.cssText = 'position:absolute;top:8px;right:8px;width:28px;height:28px;background:#707A8A;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:10;';
                const priceElem = card.querySelector('.coin-price');
                const price = parseFloat(priceElem?.innerText.replace('$', '')) || 0;
                const changeElem = card.querySelector('.coin-change');
                const change = parseFloat(changeElem?.innerText) || 0;
                icon.onclick = (e) => { e.stopPropagation(); showBotModal(symbol, price, change); };
                card.style.position = 'relative';
                card.appendChild(icon);
            }
        });
    }

    async function updateChart() {
        if (!currentSymbol) return;
        const chartContainer = document.getElementById('chartContainer');
        if (!chartContainer) return;
        chartContainer.innerHTML = '<div class="loading-chart">Loading chart data for ' + currentSymbol + '...</div><canvas id="priceChart" style="display:none;"></canvas>';
        const coinId = symbolToCoinGeckoId[currentSymbol];
        if (!coinId) { chartContainer.innerHTML = '<div class="loading-chart">Coin not found</div>'; return; }
        try {
            const response = await fetch(`${COINGECKO_API}/coins/${coinId}/market_chart?vs_currency=usd&days=${currentDays}`);
            const data = await response.json();
            if (!data || !data.prices || data.prices.length === 0) { chartContainer.innerHTML = '<div class="loading-chart">No data available</div>'; return; }
            const prices = data.prices;
            const labels = [], priceValues = [];
            for (let i = 0; i < prices.length; i++) {
                const date = new Date(prices[i][0]);
                let label = currentDays <= 2 ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                labels.push(label);
                priceValues.push(prices[i][1]);
            }
            chartContainer.innerHTML = '<canvas id="priceChart"></canvas>';
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (priceChart) priceChart.destroy();
            const firstPrice = priceValues[0];
            const lastPrice = priceValues[priceValues.length - 1];
            const changePercent = ((lastPrice - firstPrice) / firstPrice) * 100;
            const changeClass = changePercent >= 0 ? 'price-up' : 'price-down';
            document.getElementById('currentPrice').innerHTML = formatCurrency(lastPrice);
            document.getElementById('priceChange').innerHTML = `${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%`;
            document.getElementById('priceChange').className = `price-change ${changeClass}`;
            document.getElementById('symbolName').innerHTML = `${currentSymbol}/USDC`;
            document.getElementById('currentCoinIcon').src = getTokenIcon(currentSymbol);
            currentPrice = lastPrice;
            priceChart = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [{ label: `${currentSymbol} Price (USD)`, data: priceValues, borderColor: '#1E2329', backgroundColor: 'rgba(30,35,41,0.05)', borderWidth: 2, fill: true, tension: 0.2, pointRadius: 0, pointHoverRadius: 5 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: '#EFF2F5' } } } }
            });
            addChartBotIcon();
        } catch (error) { console.error('Error updating chart:', error); chartContainer.innerHTML = '<div class="loading-chart">Error loading chart</div>'; }
    }

    function generateOrderBook(price) {
        let bids = [], asks = [];
        for (let i = 0; i < 5; i++) {
            bids.push({ price: price * (1 - (0.0005 + i * 0.0005)), size: 0.5 + Math.random() * 3 });
            asks.push({ price: price * (1 + (0.0005 + i * 0.0005)), size: 0.5 + Math.random() * 3 });
        }
        let bidTotal = 0, askTotal = 0;
        return { bids: bids.map(b => ({ ...b, total: bidTotal += b.size })), asks: asks.map(a => ({ ...a, total: askTotal += a.size })) };
    }

    function renderOrderBook() {
        if (!currentPrice) return;
        const book = generateOrderBook(currentPrice);
        document.getElementById('askOrders').innerHTML = book.asks.map(a => `<div class="orderbook-row" onclick="setPrice(${a.price})"><span class="ask-price">${formatCurrency(a.price)}</span><span>${formatNumber(a.size)}</span><span>${formatNumber(a.total)}</span></div>`).join('');
        document.getElementById('bidOrders').innerHTML = book.bids.map(b => `<div class="orderbook-row" onclick="setPrice(${b.price})"><span class="bid-price">${formatCurrency(b.price)}</span><span>${formatNumber(b.size)}</span><span>${formatNumber(b.total)}</span></div>`).join('');
    }

    async function updateButtonState() {
        try {
            const balance = await apiCall('/trading/my_balance/');
            userGrandBalance = parseFloat(balance.grand_balance) || 0;
            const buyBtn = document.getElementById('buyBtn'), buyBtnMarket = document.getElementById('buyBtnMarket'), sellBtn = document.getElementById('sellBtn'), sellBtnMarket = document.getElementById('sellBtnMarket');
            if (userGrandBalance <= 0) { buyBtn.classList.add('btn-buy-disabled'); buyBtnMarket.classList.add('btn-buy-disabled'); }
            else { buyBtn.classList.remove('btn-buy-disabled'); buyBtnMarket.classList.remove('btn-buy-disabled'); }
            const holdings = await apiCall('/trading/my_tokens/');
            const currentHoldings = holdings.find(h => h.token_symbol === currentSymbol);
            const hasCurrentToken = currentHoldings && parseFloat(currentHoldings.quantity) > 0;
            if (!hasCurrentToken) { sellBtn.classList.add('btn-sell-disabled'); sellBtnMarket.classList.add('btn-sell-disabled'); }
            else { sellBtn.classList.remove('btn-sell-disabled'); sellBtnMarket.classList.remove('btn-sell-disabled'); }
        } catch (e) { console.error(e); }
    }

    async function loadCoins() {
        try {
            tokens = await apiCall('/trading/');
            const topCoins = tokens.slice(0, 5);
            const container = document.getElementById('coinList');
            if (container) {
                container.innerHTML = topCoins.map(token => {
                    const change = (Math.random() - 0.5) * 8;
                    const changeClass = change >= 0 ? 'price-up' : 'price-down';
                    return `<div class="coin-item" onclick="selectCoin('${token.symbol}')"><div class="coin-info"><img src="${getTokenIcon(token.symbol)}" style="width:28px;height:28px;border-radius:50%;"><div><div class="coin-symbol">${token.symbol}</div><div class="coin-name">${token.name}</div></div></div><div style="text-align:right;"><div class="coin-price">${formatCurrency(token.current_price)}</div><div class="coin-change ${changeClass}">${change >= 0 ? '+' : ''}${Math.abs(change).toFixed(2)}%</div></div></div>`;
                }).join('');
            }
            const totalVolume = Math.random() * 500000000;
            document.getElementById('globalVolume').innerHTML = formatNumber(totalVolume / 1000000, 2) + 'M';
            const currentToken = tokens.find(t => t.symbol === currentSymbol);
            if (currentToken) { currentPrice = parseFloat(currentToken.current_price); document.getElementById('currentPrice').innerHTML = formatCurrency(currentPrice); document.getElementById('currentCoinIcon').src = getTokenIcon(currentSymbol); }
            await updateButtonState();
            addCardBotIcons();
        } catch (e) { console.error('Error loading coins:', e); }
    }

    function selectCoin(symbol) {
        currentSymbol = symbol;
        const token = tokens.find(t => t.symbol === symbol);
        if (token) {
            currentPrice = parseFloat(token.current_price);
            document.getElementById('currentPrice').innerHTML = formatCurrency(currentPrice);
            document.getElementById('currentCoinIcon').src = getTokenIcon(symbol);
            document.getElementById('symbolName').innerHTML = `${symbol}/USDC`;
            updateChart();
            renderOrderBook();
            updateButtonState();
            setTimeout(() => addChartBotIcon(), 500);
        }
        document.getElementById('buyBtn').innerHTML = `Buy ${symbol}`;
        document.getElementById('sellBtn').innerHTML = `Sell ${symbol}`;
        document.getElementById('buyBtnMarket').innerHTML = `Buy ${symbol}`;
        document.getElementById('sellBtnMarket').innerHTML = `Sell ${symbol}`;
    }
    window.selectCoin = selectCoin;

    async function loadUserData() {
        try {
            const balance = await apiCall('/trading/my_balance/');
            userBalance = parseFloat(balance.grand_balance);
            document.getElementById('userBalance').innerHTML = formatCurrency(userBalance);
            const holdings = await apiCall('/trading/my_tokens/');
            userHoldings = {};
            holdings.forEach(h => { userHoldings[h.token_symbol] = parseFloat(h.quantity); });
            await updateButtonState();
        } catch (e) { console.error(e); }
    }

    function setPrice(price) { document.getElementById('limitPrice').value = price.toFixed(2); const amount = document.getElementById('limitAmount').value; if (amount) document.getElementById('limitTotal').innerHTML = formatCurrency(parseFloat(amount)); }
    window.setPrice = setPrice;

    async function executeBuy() {
        if (userGrandBalance <= 0) { alert('Insufficient balance to buy. Please deposit USDC first.'); return; }
        const token = tokens.find(t => t.symbol === currentSymbol);
        if (!token) return;
        const activeTab = document.querySelector('.order-tab.active').getAttribute('data-tab');
        const amount = activeTab === 'limit' ? parseFloat(document.getElementById('limitAmount').value) : parseFloat(document.getElementById('marketAmount').value);
        if (!amount || amount <= 0) { alert('Enter amount'); return; }
        if (amount > userGrandBalance) { alert(`Insufficient balance: ${formatCurrency(userGrandBalance)}`); return; }
        try {
            const result = await apiCall('/trading/buy/', 'POST', { token_id: token.id, amount_usdc: amount });
            if (result.success) { alert(`Bought ${result.purchase.quantity} ${currentSymbol}`); await loadUserData(); await updateButtonState(); document.getElementById('limitAmount').value = ''; document.getElementById('marketAmount').value = ''; document.getElementById('limitTotal').innerHTML = '$0.00'; }
            else alert('Purchase failed');
        } catch (e) { alert('Error: ' + e.message); }
    }

    async function executeSell() {
        const token = tokens.find(t => t.symbol === currentSymbol);
        if (!token) return;
        const userQty = userHoldings[currentSymbol] || 0;
        if (userQty === 0) { alert(`No ${currentSymbol} to sell`); return; }
        const activeTab = document.querySelector('.order-tab.active').getAttribute('data-tab');
        let quantity;
        if (activeTab === 'limit') {
            const amount = parseFloat(document.getElementById('limitAmount').value);
            if (!amount || amount <= 0) { alert('Enter amount'); return; }
            quantity = amount / parseFloat(token.current_price);
        } else {
            const amount = parseFloat(document.getElementById('marketAmount').value);
            if (!amount || amount <= 0) { alert('Enter amount'); return; }
            quantity = amount / parseFloat(token.current_price);
        }
        if (quantity > userQty) { alert(`Insufficient: ${formatNumber(userQty)} ${currentSymbol}`); return; }
        try {
            const result = await apiCall('/trading/sell/', 'POST', { token_id: token.id, quantity: quantity });
            if (result.success) { alert(`Sold ${result.sale.quantity} ${currentSymbol}`); await loadUserData(); await updateButtonState(); document.getElementById('limitAmount').value = ''; document.getElementById('marketAmount').value = ''; document.getElementById('limitTotal').innerHTML = '$0.00'; }
            else alert('Sale failed');
        } catch (e) { alert('Error: ' + e.message); }
    }

    document.querySelectorAll('[data-perc]').forEach(btn => {
        btn.addEventListener('click', function() { const percent = parseInt(this.getAttribute('data-perc')); const amount = (userBalance * percent) / 100; document.getElementById('limitAmount').value = amount.toFixed(2); document.getElementById('limitTotal').innerHTML = formatCurrency(amount); });
    });

    document.querySelectorAll('[data-market-perc]').forEach(btn => {
        btn.addEventListener('click', function() { const percent = parseInt(this.getAttribute('data-market-perc')); document.getElementById('marketAmount').value = ((userBalance * percent) / 100).toFixed(2); });
    });

    document.getElementById('limitAmount').addEventListener('input', function() { document.getElementById('limitTotal').innerHTML = formatCurrency(parseFloat(this.value) || 0); });

    document.querySelectorAll('.order-tab').forEach(btn => {
        btn.addEventListener('click', function() { document.querySelectorAll('.order-tab').forEach(b => b.classList.remove('active')); this.classList.add('active'); const tab = this.getAttribute('data-tab'); document.getElementById('limitPanel').style.display = tab === 'limit' ? 'block' : 'none'; document.getElementById('marketPanel').style.display = tab === 'market' ? 'block' : 'none'; });
    });

    document.querySelectorAll('.tf-btn').forEach(btn => {
        btn.addEventListener('click', async function() { document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); currentDays = parseInt(this.getAttribute('data-tf')); await updateChart(); });
    });

    document.getElementById('buyBtn').addEventListener('click', executeBuy);
    document.getElementById('sellBtn').addEventListener('click', executeSell);
    document.getElementById('buyBtnMarket').addEventListener('click', executeBuy);
    document.getElementById('sellBtnMarket').addEventListener('click', executeSell);

    window.addEventListener('resize', function() { if (priceChart) priceChart.resize(); });

    async function init() {
        await loadCoins();
        await loadUserData();
        const selectedCoin = localStorage.getItem('selectedCoin');
        if (selectedCoin) { currentSymbol = selectedCoin; localStorage.removeItem('selectedCoin'); selectCoin(currentSymbol); }
        await updateChart();
        renderOrderBook();
        updateButtonState();
        setInterval(() => renderOrderBook(), 3000);
        setInterval(async () => { await loadCoins(); await loadUserData(); await updateChart(); }, 120000);
        addCardBotIcons();
    }

    init();
</script>

<style>
.bot-buy { color: #0ECB81; font-weight: bold; }
.bot-sell { color: #F6465D; font-weight: bold; }
.bot-neutral { color: #F0B90B; font-weight: bold; }
.bot-icon { transition: all 0.3s; }
.bot-icon:hover { transform: scale(1.1); }
@keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
{% endblock %}
