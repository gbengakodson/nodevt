services:
  - type: web
    name: node-volatility-crypto
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: node-crypto-db
          property: connectionString

  - type: cron
    name: hourly-notifications
    schedule: "0 * * * *"  # Runs at minute 0 of every hour
    command: python manage.py send_hourly_notifications


  - type: cron
    name: morning-notifications
    schedule: "0 8 * * *"  # 8 AM daily
    command: python manage.py send_daily_notifications --time-slot morning

  - type: cron
    name: afternoon-notifications
    schedule: "0 13 * * *"  # 1 PM daily
    command: python manage.py send_daily_notifications --time-slot afternoon

  - type: cron
    name: evening-notifications
    schedule: "0 19 * * *"  # 7 PM daily
    command: python manage.py send_daily_notifications --time-slot evening